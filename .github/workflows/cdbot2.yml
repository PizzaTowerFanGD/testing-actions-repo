name: OWOT Windows Desktop Bot (Quarantined)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL to zip containing the app'
        required: true
      owot_world:
        description: 'OWOT world name (leave empty for main world)'
        required: false
        default: ''

jobs:
  run-bot:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          choco install ffmpeg -y
          npm install @nut-tree-fork/nut-js ws

      - name: Run Bot
        env:
          ZIP_URL: ${{ github.event.inputs.zip_url }}
          OWOT_WORLD: ${{ github.event.inputs.owot_world }}
          TWITCH_STREAM_KEY: ${{ secrets.TWITCH_STREAM_KEY }}
        shell: powershell
        run: |
          $zipPath = "$env:TEMP\app.zip"
          $extractPath = "$env:TEMP\app"
          Invoke-WebRequest -Uri $env:ZIP_URL -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          $exe = Get-ChildItem -Path $extractPath -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "no exe found in zip"; exit 1 }
          Write-Host "found exe: $($exe.FullName)"

          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()
          Start-Sleep -Seconds 1

          Add-Type -TypeDefinition "using System; using System.Runtime.InteropServices; public class WinApi { [DllImport(`"user32.dll`")] public static extern bool ShowWindow(IntPtr hWnd, int nCmdShow); [DllImport(`"user32.dll`")] public static extern bool GetWindowRect(IntPtr hWnd, out RECT rect); public struct RECT { public int Left, Top, Right, Bottom; } }"

          $proc = Start-Process $exe.FullName -PassThru
          Start-Sleep -Seconds 2
          [WinApi]::ShowWindow($proc.MainWindowHandle, 3)
          Start-Sleep -Seconds 1

          $rect = New-Object WinApi+RECT
          [WinApi]::GetWindowRect($proc.MainWindowHandle, [ref]$rect)
          $w = $rect.Right - $rect.Left
          $h = $rect.Bottom - $rect.Top
          $x = $rect.Left
          $y = $rect.Top
          Write-Host "window: ${w}x${h} at ${x},${y}"

          $ffmpegProc = Start-Process ffmpeg -ArgumentList @(
            '-f', 'gdigrab', '-framerate', '30',
            '-offset_x', "$x", '-offset_y', "$y",
            '-video_size', "${w}x${h}",
            '-i', 'desktop',
            '-c:v', 'libx264', '-preset', 'veryfast',
            '-maxrate', '3000k', '-bufsize', '6000k',
            '-pix_fmt', 'yuv420p', '-g', '60',
            '-f', 'flv', "rtmp://live.twitch.tv/app/$env:TWITCH_STREAM_KEY"
          ) -PassThru -NoNewWindow

          $monitor = Start-Job -ScriptBlock {
            param($hwnd, $streamKey, $ffmpegId)
            Add-Type -TypeDefinition "using System; using System.Runtime.InteropServices; public class WinApi2 { [DllImport(`"user32.dll`")] public static extern bool GetWindowRect(IntPtr hWnd, out RECT rect); public struct RECT { public int Left, Top, Right, Bottom; } }"
            $lw = 0; $lh = 0; $lx = 0; $ly = 0
            while ($true) {
              Start-Sleep -Seconds 2
              $r = New-Object WinApi2+RECT
              [WinApi2]::GetWindowRect([IntPtr]$hwnd, [ref]$r)
              $w = $r.Right - $r.Left
              $h = $r.Bottom - $r.Top
              $x = $r.Left
              $y = $r.Top
              if ($w -ne $lw -or $h -ne $lh -or $x -ne $lx -or $y -ne $ly) {
                $lw = $w; $lh = $h; $lx = $x; $ly = $y
                Stop-Process -Id $ffmpegId -Force -ErrorAction SilentlyContinue
                Start-Sleep -Seconds 1
                $ffmpegId = (Start-Process ffmpeg -ArgumentList @(
                  '-f', 'gdigrab', '-framerate', '30',
                  '-offset_x', "$x", '-offset_y', "$y",
                  '-video_size', "${w}x${h}",
                  '-i', 'desktop',
                  '-c:v', 'libx264', '-preset', 'veryfast',
                  '-maxrate', '3000k', '-bufsize', '6000k',
                  '-pix_fmt', 'yuv420p', '-g', '60',
                  '-f', 'flv', "rtmp://live.twitch.tv/app/$streamKey"
                ) -PassThru -NoNewWindow).Id
              }
            }
          } -ArgumentList $proc.MainWindowHandle, $env:TWITCH_STREAM_KEY, $ffmpegProc.Id

          $botJs = "$env:TEMP\bot.js"
          $b64 = ""
          [System.IO.File]::WriteAllBytes($botJs, [System.Convert]::FromBase64String($b64))
          node $botJs
