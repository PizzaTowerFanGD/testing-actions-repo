name: Render Manim Scene
on:
  workflow_dispatch:
    inputs:
      script_url:
        description: 'Direct URL to the Manim .py script'
        required: true
      quality:
        description: 'Render Quality'
        required: true
        default: 'l'
        type: choice
        options:
          - l
          - h

jobs:
  render_scene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Manim Script
        run: |
          curl -L "${{ github.event.inputs.script_url }}" -o scene_script.py

      - name: Render Scene
        run: |
          # We run as root (-u root) so the container can create the 'media' folder
          docker run --rm \
            -u root \
            -v "$(pwd):/manim" \
            manimcommunity/manim:stable \
            manim -q${{ github.event.inputs.quality }} /manim/scene_script.py

      - name: Check output structure
        run: ls -R media/

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: manim-video-${{ github.event.inputs.quality }}
          # This path captures all videos rendered from that script
          path: media/videos/scene_script/
          if-no-files-found: error
