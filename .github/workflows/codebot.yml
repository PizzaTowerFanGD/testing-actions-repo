name: OWOT Windows Desktop Bot

on:
  workflow_dispatch:
    inputs:
      owot_world:
        description: 'OWOT world name (leave empty for main world)'
        required: false
        default: ''

jobs:
  run-bot:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          choco install ffmpeg -y
          npm install @nut-tree-fork/nut-js ws

      - name: Run Bot
        env:
          OWOT_WORLD: ${{ github.event.inputs.owot_world }}
          TWITCH_STREAM_KEY: ${{ secrets.TWITCH_STREAM_KEY }}
        shell: powershell
        run: |
          # minimize all windows
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()
          Start-Sleep -Seconds 1

          Start-Process ffmpeg -ArgumentList @(
            '-f', 'gdigrab', '-framerate', '30', '-i', 'desktop',
            '-c:v', 'libx264', '-preset', 'veryfast',
            '-maxrate', '3000k', '-bufsize', '6000k',
            '-pix_fmt', 'yuv420p', '-g', '60',
            '-f', 'flv', "rtmp://live.twitch.tv/app/$env:TWITCH_STREAM_KEY"
          ) -NoNewWindow

          node -e @"
          const { mouse, keyboard, screen, Button, Key, straightTo, Point } = require('@nut-tree-fork/nut-js');
          const WebSocket = require('ws');

          mouse.config.mouseSpeed = 1500;
          keyboard.config.autoDelayMs = 0;

          const OWOT_WORLD = process.env.OWOT_WORLD || '';
          const NICKNAME = 'CDBot';
          const PREFIX = '!cd ';
          const wsUrl = OWOT_WORLD
            ? ``wss://ourworldoftext.com/`${OWOT_WORLD}/ws/``
            : 'wss://ourworldoftext.com/ws/';

          const HELP = {
            'mouse':  'mouse (up|down|left|right) (px)',
            'moveto': 'moveto (x) (y)',
            'click':  'click (left|right|middle)?',
            'dclick': 'dclick - double click',
            'scroll': 'scroll (up|down) (amt)',
            'type':   'type (text)',
            'key':    'key (ctrl+)?(shift+)?(alt+)?key',
            'run':    'run (cmd command) - run a cmd command',
            'pos':    'pos - current mouse position',
            'size':   'size - screen dimensions',
            'stream': 'stream - get the stream link',
            'help':   'help (command)?',
          };

          const MOD_MAP = {
            ctrl: Key.LeftControl,
            shift: Key.LeftShift,
            alt: Key.LeftAlt,
            win: Key.LeftSuper,
          };

          function resolveKey(name) {
            const k = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
            if (Key[k] !== undefined) return Key[k];
            if (Key[name.toUpperCase()] !== undefined) return Key[name.toUpperCase()];
            return null;
          }

          function sendChat(ws, message) {
            ws.send(JSON.stringify({
              kind: 'chat',
              nickname: NICKNAME,
              message: message.slice(0, 440),
              location: 'page',
              color: '#ff9900'
            }));
          }

          async function handleCommand(ws, nick, raw) {
            const args = raw.trim().split(/\s+/);
            const cmd = args[0]?.toLowerCase();
            try {
              switch (cmd) {
                case 'mouse': {
                  const dir = args[1]?.toLowerCase();
                  const px = parseInt(args[2]) || 50;
                  const pos = await mouse.getPosition();
                  const deltas = {
                    up:    new Point(pos.x, pos.y - px),
                    down:  new Point(pos.x, pos.y + px),
                    left:  new Point(pos.x - px, pos.y),
                    right: new Point(pos.x + px, pos.y),
                  };
                  if (!deltas[dir]) return sendChat(ws, ``unknown dir: `${dir}``);
                  await mouse.move(straightTo(deltas[dir]));
                  const np = await mouse.getPosition();
                  sendChat(ws, ``mouse at `${np.x},`${np.y}``);
                  break;
                }
                case 'moveto': {
                  const x = parseInt(args[1]);
                  const y = parseInt(args[2]);
                  if (isNaN(x) || isNaN(y)) return sendChat(ws, 'usage: moveto (x) (y)');
                  await mouse.move(straightTo(new Point(x, y)));
                  sendChat(ws, ``moved to `${x},`${y}``);
                  break;
                }
                case 'click': {
                  const btnMap = { left: Button.LEFT, right: Button.RIGHT, middle: Button.MIDDLE };
                  const btn = btnMap[args[1]?.toLowerCase()] ?? Button.LEFT;
                  await mouse.click(btn);
                  const pos = await mouse.getPosition();
                  sendChat(ws, ``clicked at `${pos.x},`${pos.y}``);
                  break;
                }
                case 'dclick': {
                  await mouse.doubleClick(Button.LEFT);
                  sendChat(ws, 'double clicked');
                  break;
                }
                case 'scroll': {
                  const dir = args[1]?.toLowerCase();
                  const amt = parseInt(args[2]) || 3;
                  if (dir === 'up') await mouse.scrollUp(amt);
                  else if (dir === 'down') await mouse.scrollDown(amt);
                  else return sendChat(ws, 'usage: scroll (up|down) (amt)');
                  sendChat(ws, ``scrolled `${dir} `${amt}``);
                  break;
                }
                case 'type': {
                  const text = args.slice(1).join(' ');
                  if (!text) return sendChat(ws, 'usage: type (text)');
                  await keyboard.type(text);
                  sendChat(ws, ``typed: `${text.slice(0, 80)}``);
                  break;
                }
                case 'key': {
                  const combo = args[1];
                  if (!combo) return sendChat(ws, 'usage: key (ctrl+)?(shift+)?(alt+)?key');
                  const parts = combo.toLowerCase().split('+');
                  const keyName = parts[parts.length - 1];
                  const mods = parts.slice(0, -1).map(m => MOD_MAP[m]).filter(Boolean);
                  const mainKey = resolveKey(keyName);
                  if (!mainKey) return sendChat(ws, ``unknown key: `${keyName}``);
                  await keyboard.pressKey(...mods, mainKey);
                  await keyboard.releaseKey(...mods, mainKey);
                  sendChat(ws, ``pressed: `${combo}``);
                  break;
                }
                case 'run': {
                  const command = args.slice(1).join(' ');
                  if (!command) return sendChat(ws, 'usage: run (cmd command)');
                  const { exec } = require('child_process');
                  exec(command, { shell: 'cmd.exe' }, (err, stdout, stderr) => {
                    if (err) sendChat(ws, ``error: `${err.message.slice(0, 400)}``);
                    else sendChat(ws, (stdout || stderr || 'done').slice(0, 440));
                  });
                  break;
                }
                case 'pos': {
                  const pos = await mouse.getPosition();
                  sendChat(ws, ``mouse at `${pos.x},`${pos.y}``);
                  break;
                }
                case 'size': {
                  const w = await screen.width();
                  const h = await screen.height();
                  sendChat(ws, ``screen: `${w}x`${h}``);
                  break;
                }
                case 'stream': {
                  sendChat(ws, 'streaming at twitch.tv/gimmickcellar');
                  break;
                }
                case 'help': {
                  const topic = args[1]?.toLowerCase();
                  sendChat(ws, topic && HELP[topic] ? HELP[topic] : ``commands: `${Object.keys(HELP).join(', ')}``);
                  break;
                }
                default:
                  sendChat(ws, ``unknown command: `${cmd} - try !cd help``);
              }
            } catch (e) {
              sendChat(ws, ``error: `${e.message.slice(0, 200)}``);
            }
          }

          async function main() {
            const ws = new WebSocket(wsUrl);
            ws.on('open', () => sendChat(ws, 'CDBot online - !cd help for commands | streaming at twitch.tv/gimmickcellar'));
            ws.on('message', async (raw) => {
              let data;
              try { data = JSON.parse(raw.toString()); } catch { return; }
              if (data.kind !== 'chat') return;
              const msg = data.message || '';
              const nick = data.nickname || 'anon';
              if (!msg.startsWith(PREFIX)) return;
              const rest = msg.slice(PREFIX.length).trim();
              if (!rest) return sendChat(ws, '!cd help for commands');
              await handleCommand(ws, nick, rest);
            });
            ws.on('close', () => process.exit(0));
            ws.on('error', (e) => console.error(``ws error: `${e.message}``));
          }

          main().catch(e => { console.error(e); process.exit(1); });
          "@
