name: OWOT Headless Browser Bot

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL for the headless browser to navigate to'
        required: true
        default: 'https://example.com'
      owot_world:
        description: 'OWOT world name (leave empty for main world)'
        required: false
        default: ''

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get install -y xvfb ffmpeg
          npm install puppeteer ws

      - name: Run OWOT Browser Bot
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          OWOT_WORLD: ${{ github.event.inputs.owot_world }}
          TWITCH_STREAM_KEY: ${{ secrets.TWITCH_STREAM_KEY }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 1

          ffmpeg -f x11grab -r 30 -s 1280x720 -i :99 \
            -c:v libx264 -preset veryfast -maxrate 3000k -bufsize 6000k \
            -pix_fmt yuv420p -g 60 -f flv \
            rtmp://live.twitch.tv/app/$TWITCH_STREAM_KEY &

          node << 'EOF'
          const puppeteer = require('puppeteer');
          const WebSocket = require('ws');

          const TARGET_URL = process.env.TARGET_URL || 'https://example.com';
          const OWOT_WORLD = process.env.OWOT_WORLD || '';
          const NICKNAME = 'CDBot';
          const PREFIX = '!cd ';
          const wsUrl = OWOT_WORLD
            ? `wss://ourworldoftext.com/${OWOT_WORLD}/ws/`
            : 'wss://ourworldoftext.com/ws/';

          const HELP = {
            'mouse': 'mouse (up|down|left|right) (px) — move cursor',
            'click': 'click (left|right|middle)? — click at current pos',
            'scroll': 'scroll (up|down) (px)',
            'type': 'type (text) — type text',
            'key': 'key (ctrl+)?(shift+)?(alt+)?key — press key combo',
            'goto': 'goto (url) — navigate to url',
            'eval': 'eval (js) — evaluate js in browser',
            'pos': 'pos — report current mouse position',
            'help': 'help (command)? — show help',
          };

          let mouseX = 640, mouseY = 360;

          function sendChat(ws, message) {
            ws.send(JSON.stringify({
              kind: 'chat',
              nickname: NICKNAME,
              message: message.slice(0, 440),
              location: 'page',
              color: '#ff9900'
            }));
          }

          async function handleCommand(page, ws, nick, raw) {
            const args = raw.trim().split(/\s+/);
            const cmd = args[0]?.toLowerCase();

            switch (cmd) {
              case 'mouse': {
                const dir = args[1]?.toLowerCase();
                const px = parseInt(args[2]) || 50;
                const deltas = { up:[0,-px], down:[0,px], left:[-px,0], right:[px,0] };
                if (!deltas[dir]) return sendChat(ws, `unknown direction: ${dir}`);
                mouseX = Math.max(0, Math.min(1280, mouseX + deltas[dir][0]));
                mouseY = Math.max(0, Math.min(720, mouseY + deltas[dir][1]));
                await page.mouse.move(mouseX, mouseY);
                sendChat(ws, `mouse moved to ${mouseX},${mouseY}`);
                break;
              }

              case 'click': {
                const btn = ['left','right','middle'].includes(args[1]) ? args[1] : 'left';
                await page.mouse.click(mouseX, mouseY, { button: btn });
                sendChat(ws, `${btn} click at ${mouseX},${mouseY}`);
                break;
              }

              case 'scroll': {
                const dir = args[1]?.toLowerCase();
                const px = parseInt(args[2]) || 100;
                const dy = dir === 'up' ? -px : px;
                await page.mouse.wheel({ deltaY: dy });
                sendChat(ws, `scrolled ${dir} ${px}px`);
                break;
              }

              case 'type': {
                const text = args.slice(1).join(' ');
                if (!text) return sendChat(ws, 'usage: type (text)');
                await page.keyboard.type(text);
                sendChat(ws, `typed: ${text.slice(0, 80)}`);
                break;
              }

              case 'key': {
                // parse e.g. ctrl+shift+a
                const combo = args[1];
                if (!combo) return sendChat(ws, 'usage: key (ctrl+)?(shift+)?(alt+)?key');
                const parts = combo.toLowerCase().split('+');
                const key = parts[parts.length - 1];
                const mods = parts.slice(0, -1);
                for (const m of mods) await page.keyboard.down(capitalize(m));
                await page.keyboard.press(capitalize(key));
                for (const m of mods) await page.keyboard.up(capitalize(m));
                sendChat(ws, `pressed: ${combo}`);
                break;
              }

              case 'goto': {
                const url = args[1];
                if (!url) return sendChat(ws, 'usage: goto (url)');
                try {
                  await page.goto(url, { waitUntil: 'networkidle2', timeout: 15000 });
                  sendChat(ws, `navigated to: ${await page.title()}`);
                } catch (e) {
                  sendChat(ws, `goto failed: ${e.message.slice(0, 200)}`);
                }
                break;
              }

              case 'eval': {
                const code = args.slice(1).join(' ');
                if (!code) return sendChat(ws, 'usage: eval (js)');
                try {
                  const result = await page.evaluate(code);
                  const str = typeof result === 'object'
                    ? JSON.stringify(result)
                    : String(result);
                  sendChat(ws, `=> ${str}`);
                } catch (e) {
                  sendChat(ws, `ERROR: ${e.message.slice(0, 200)}`);
                }
                break;
              }

              case 'pos': {
                sendChat(ws, `mouse at ${mouseX},${mouseY}`);
                break;
              }

              case 'help': {
                const topic = args[1]?.toLowerCase();
                if (topic && HELP[topic]) {
                  sendChat(ws, HELP[topic]);
                } else {
                  sendChat(ws, `commands: ${Object.keys(HELP).join(', ')}`);
                }
                break;
              }

              default:
                sendChat(ws, `unknown command: ${cmd} — try !cd help`);
            }
          }

          function capitalize(s) {
            return s.charAt(0).toUpperCase() + s.slice(1);
          }

          async function main() {
            const browser = await puppeteer.launch({
              headless: false,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--window-size=1280,720',
                '--window-position=0,0'
              ]
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });

            try {
              await page.goto(TARGET_URL, { waitUntil: 'networkidle2', timeout: 30000 });
              console.log(`loaded: ${await page.title()}`);
            } catch (e) {
              console.warn(`page load issue: ${e.message} — continuing anyway`);
            }

            await page.mouse.move(mouseX, mouseY);

            const ws = new WebSocket(wsUrl);
            ws.on('open', () => sendChat(ws, `CDBot online — ${TARGET_URL} — !cd help for commands`));

            ws.on('message', async (raw) => {
              let data;
              try { data = JSON.parse(raw.toString()); } catch { return; }
              if (data.kind !== 'chat') return;
              const msg = data.message || '';
              const nick = data.nickname || 'anon';
              if (!msg.startsWith(PREFIX)) return;
              const rest = msg.slice(PREFIX.length).trim();
              if (!rest) return sendChat(ws, `!cd help for commands`);
              await handleCommand(page, ws, nick, rest);
            });

            ws.on('close', () => { browser.close(); process.exit(0); });
            ws.on('error', (e) => console.error(`ws error: ${e.message}`));
            process.on('SIGTERM', async () => { await browser.close(); process.exit(0); });
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
